name: Build Sanne Script Compiler

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  linux-build:

    name: Build Linux Binary

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt update
          sudo apt install -y gcc

      - name: Build Linux Binary
        run: |
          gcc compile.c -o compile

      - name: Verify Linux Binary
        run: |
          ls -lah
          file compile

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compile-linux
          path: compile

  windows-build:

    name: Build Windows Binary

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            make
            mingw-w64-x86_64-gcc

      - name: Clone TinyCC
        shell: msys2 {0}
        run: |
          git clone https://github.com/TinyCC/tinycc.git

      - name: Build TinyCC
        shell: msys2 {0}
        run: |
          cd tinycc
          ./configure
          make

      - name: Verify TinyCC Build
        shell: msys2 {0}
        run: |
          ls -lah tinycc

      - name: Build compile.exe
        shell: msys2 {0}
        run: |
          gcc compile.c tinycc/libtcc.dll -o compile.exe

      - name: Copy TinyCC DLL
        shell: msys2 {0}
        run: |
          cp tinycc/libtcc.dll .

      - name: Verify Windows Binary
        shell: msys2 {0}
        run: |
          ls -lah
          file compile.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compile-windows
          path: |
            compile.exe
            libtcc.dll
